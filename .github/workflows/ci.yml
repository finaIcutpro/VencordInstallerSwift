name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        run: |
          xcodebuild \
            -scheme VencordInstallerSwift \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            test
