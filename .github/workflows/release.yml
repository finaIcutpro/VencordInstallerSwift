name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 1.0.0)
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
            echo "TAG=v${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
            echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Package
        env:
          COPYFILE_DISABLE: 1
        run: |
          chmod +x Scripts/package-release.sh
          VERSION="$VERSION" BUILD_NUMBER="${{ github.run_number }}" Scripts/package-release.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true
          files: |
            dist/VencordInstaller.MacOS.dmg
            dist/VencordInstaller.MacOS.zip
          body: |
            ### Install

            1. Download `VencordInstaller.MacOS.dmg` below and open it
            2. Drag **VencordInstaller** into **Applications**
            3. Close Discord, then open the installer and patch your install

            A `.zip` is also attached if you prefer that format.

            > This build is unsigned. On first launch, right-click the app → **Open** to bypass Gatekeeper.
